<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Макет: Вход</title>
  <link rel="stylesheet" href="wireframe.css">
</head>
<body>
  <div class="wf-login-wrap">
    <div class="wf-login-card">
      <div style="text-align:center;margin-bottom:18px;">
        <div style="font-weight:bold;font-size:18px;">[ ЛОГО ]</div>
        <div style="font-size:12px;color:#666;margin-top:4px;">Садовый инвентарь</div>
        <div style="font-size:12px;color:#888;margin-top:8px;">Войдите, чтобы продолжить</div>
      </div>

      <div class="wf-fg">
        <label>Имя пользователя</label>
        <input type="text" placeholder="Введите логин">
      </div>
      <div class="wf-fg">
        <label>Пароль</label>
        <input type="password" placeholder="••••••••">
      </div>

      <div class="wf-btn primary full" style="margin-top:6px;">Войти</div>

      <div style="text-align:center;font-size:11px;color:#888;margin-top:14px;">
        Управление садовым инвентарём
      </div>
    </div>
  </div>
  <div class="wf-page">
    <p style="font-size:11px;color:#888;text-align:center;">&larr; <a href="index.html">К списку макетов</a></p>
  </div>
</body>
</html>
